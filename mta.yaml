_schema-version: 3.3.0
ID: productshop
description: A simple CAP project.
version: 1.0.0
modules:
  - name: productshop-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: productshop-db
      - name: productshop-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: productshop-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: productshop-db
    parameters:
      buildpack: nodejs_buildpack
  - name: productshop-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: productshop-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - nsproductshop.zip
          name: nsproductshop
          target-path: resources/
        - artifacts:
            - nsproducts.zip
          name: nsproducts
          target-path: resources/
  - name: nsproductshop
    type: html5
    path: app/productshop
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
  - name: nsproducts
    type: html5
    path: app/products
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: productshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: productshop-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: productshop-html5-service
      service-plan: app-host
  - name: productshop-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: productshop-destination-service
      service-plan: lite
  - name: productshop-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: productshop-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'productmanager (productshop ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.productmanager'
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
